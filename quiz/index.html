<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Quiz</title>
    <link rel="icon" href="../image/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <!-- Start Screen -->
        <div class="screen active" id="startScreen">
            <div class="screen-icon"><i class="fas fa-brain"></i></div>
            <h1>Brain Training Quiz</h1>
            <p>Test your knowledge across multiple topics. How many can you get right?</p>
            <div class="category-select">
                <h3>Choose a category</h3>
                <div class="categories">
                    <button class="cat-btn active" data-cat="all"><i class="fas fa-globe"></i> All Topics</button>
                    <button class="cat-btn" data-cat="gk"><i class="fas fa-earth-asia"></i> General Knowledge</button>
                    <button class="cat-btn" data-cat="tech"><i class="fas fa-laptop-code"></i> Technology</button>
                    <button class="cat-btn" data-cat="science"><i class="fas fa-flask"></i> Science</button>
                    <button class="cat-btn" data-cat="nepal"><i class="fas fa-mountain"></i> Nepal</button>
                </div>
            </div>
            <button class="btn-start" id="startBtn">
                <i class="fas fa-play"></i> Start Quiz
            </button>
        </div>

        <!-- Quiz Screen -->
        <div class="screen" id="quizScreen">
            <div class="quiz-header">
                <div class="quiz-info">
                    <span class="question-counter"><span id="currentQ">1</span> / <span id="totalQ">10</span></span>
                    <span class="score-display"><i class="fas fa-star"></i> <span id="score">0</span></span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="question-card glass-card">
                <div class="question-category" id="qCategory">General Knowledge</div>
                <h2 class="question-text" id="questionText">Loading question...</h2>
            </div>

            <div class="answers-grid" id="answersGrid">
                <button class="answer-btn glass-card" data-index="0">
                    <span class="answer-letter">A</span>
                    <span class="answer-text" id="ans0">Answer 1</span>
                </button>
                <button class="answer-btn glass-card" data-index="1">
                    <span class="answer-letter">B</span>
                    <span class="answer-text" id="ans1">Answer 2</span>
                </button>
                <button class="answer-btn glass-card" data-index="2">
                    <span class="answer-letter">C</span>
                    <span class="answer-text" id="ans2">Answer 3</span>
                </button>
                <button class="answer-btn glass-card" data-index="3">
                    <span class="answer-letter">D</span>
                    <span class="answer-text" id="ans3">Answer 4</span>
                </button>
            </div>

            <div class="quiz-footer">
                <div class="timer" id="timer">
                    <div class="timer-bar" id="timerBar"></div>
                    <span id="timerText">15s</span>
                </div>
                <button class="btn-next" id="nextBtn" disabled>
                    Next <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div class="screen" id="resultScreen">
            <div class="result-icon" id="resultIcon"><i class="fas fa-trophy"></i></div>
            <h2 id="resultTitle">Great Job!</h2>
            <p class="result-subtitle" id="resultSubtitle">You've completed the quiz</p>

            <div class="result-stats">
                <div class="stat glass-card">
                    <span class="stat-val" id="finalScore">0</span>
                    <span class="stat-label">Score</span>
                </div>
                <div class="stat glass-card">
                    <span class="stat-val" id="correctCount">0</span>
                    <span class="stat-label">Correct</span>
                </div>
                <div class="stat glass-card">
                    <span class="stat-val" id="wrongCount">0</span>
                    <span class="stat-label">Wrong</span>
                </div>
                <div class="stat glass-card">
                    <span class="stat-val" id="accuracy">0%</span>
                    <span class="stat-label">Accuracy</span>
                </div>
            </div>

            <div class="result-actions">
                <button class="btn-start" id="playAgainBtn">
                    <i class="fas fa-redo"></i> Play Again
                </button>
                <button class="btn-home" id="homeBtn">
                    <i class="fas fa-home"></i> Home
                </button>
            </div>
        </div>

        <a href="../index.html#projects" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
